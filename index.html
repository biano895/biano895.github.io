<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biano - Portfólio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e27 !important;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            top: 0;
            left: 0;
            z-index: -2;
        }

        .background-elements {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #0066ff;
            top: -200px;
            right: -200px;
            animation: float 8s ease-in-out infinite;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: #00ffff;
            bottom: -150px;
            left: -150px;
            animation: float 10s ease-in-out infinite 1s;
        }

        .circle-3 {
            width: 350px;
            height: 350px;
            background: #ff1493;
            top: 50%;
            right: 5%;
            animation: float 12s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-50px);
            }
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            width: 100%;
            animation: fadeIn 1s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 100px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px #00ffff);
            animation: floatLogo 3s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #0066ff 0%, #00ffff 50%, #ff1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 24px;
            color: #b0b5c0;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .project-card {
            background: linear-gradient(135deg, rgba(36, 45, 74, 0.8) 0%, rgba(36, 45, 74, 0.6) 100%);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 102, 255, 0.1);
        }

        .project-card:hover {
            transform: translateY(-15px);
            border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6), inset 0 0 20px rgba(0, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.2) 0%, rgba(0, 255, 255, 0.1) 100%);
        }

        .project-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #0066ff;
            filter: drop-shadow(0 0 15px #00ffff);
            transition: all 0.3s ease;
        }

        .project-card:hover .project-icon {
            color: #00ffff;
            transform: scale(1.1);
        }

        .project-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .project-description {
            font-size: 16px;
            color: #b0b5c0;
            margin-bottom: 25px;
            line-height: 1.8;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #0066ff 0%, #0088ff 100%);
            color: #ffffff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.5);
            cursor: pointer;
        }

        .project-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 102, 255, 1);
            background: linear-gradient(135deg, #0088ff 0%, #00ccff 100%);
        }

        .project-link:active {
            transform: translateY(0);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .social-link {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.2) 0%, rgba(0, 255, 255, 0.2) 100%);
            border: 2px solid #00ffff;
            border-radius: 50%;
            color: #00ffff;
            font-size: 28px;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .social-link:hover {
            background: linear-gradient(135deg, #0066ff 0%, #00ffff 100%);
            border-color: #0066ff;
            transform: translateY(-8px);
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.8);
            color: #ffffff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }

            .subtitle {
                font-size: 18px;
                margin-bottom: 40px;
            }

            .projects {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .social-links {
                gap: 15px;
            }

            .logo {
                font-size: 70px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 36px;
            }

            .logo {
                font-size: 60px;
            }

            .project-link {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>

    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <div class="logo">🎮</div>
        <h1>BIANO</h1>
        <p class="subtitle">Bem-vindo ao meu portfólio de projetos</p>

        <div class="projects">
            <div class="project-card">
                <div class="project-icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <h2 class="project-title">Biano Games</h2>
                <p class="project-description">Portal de jogos moderno com design futurista, sistema de temas dinâmicos e interface premium com glassmorphism.</p>
                <a href="./games/" class="project-link">
                    <span>Acessar Jogos</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="social-links">
            <a href="https://github.com/biano895" target="_blank" rel="noopener noreferrer" class="social-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="social-link" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="mailto:francisco.f.filho22@aluno.senai.br" class="social-link" title="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
    </div>
</body>
</html>
